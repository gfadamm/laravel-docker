services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: "8.4"
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.28-alpine
    ports:
      - "8081:80"
    depends_on:
      - app
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backend
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.laravel.rule=Host(`laravel.test`)
      - traefik.http.services.laravel.loadbalancer.server.port=80

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  node:
    image: node:22-alpine
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - /var/www/node_modules
      - /var/www/vendor
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - backend

  redis:
    image: redis:8-alpine
    networks:
      - backend

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
    networks:
    - backend

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work
    volumes:
      - ./src:/var/www
    depends_on:
      - redis
    networks:
      - backend

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: >
      sh -c "while true; do
        php artisan schedule:run;
        sleep 60;
      done"
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
    networks:
      - backend

volumes:
  mysql_data:

networks:
  traefik:
    external: true
  backend: